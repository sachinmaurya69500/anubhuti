<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Anubhuti: the Dev Sanskriti Vishwavidyalaya internship experience portal"
    />
    <title>{% block title %}Anubhuti | Dev Sanskriti Vishwavidyalaya{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-block">
        <img class="brand-logo" src="/assets/dsvv-mark.svg" alt="Dev Sanskriti Vishwavidyalaya logo" />
        <div>
          <p class="eyebrow">Anubhuti</p>
          <h1>Dev Sanskriti Vishwavidyalaya</h1>
        </div>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/forms">Forms</a>
        <a href="/archive">Archive</a>
        {% if auth_role %}
          <a href="/dashboard">Dashboard</a>
          <form method="POST" action="/api/auth/logout" style="display:inline;">
            <button type="submit" class="button-link">Logout</button>
          </form>
          {% if auth_role == 'admin' %}
            <a href="/admin">Admin</a>
          {% endif %}
        {% else %}
          <a href="/auth">Login</a>
        {% endif %}
      </nav>
    </header>

    <main class="shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Dev Sanskriti Vishwavidyalaya. All rights reserved.</p>
    </footer>

    <script src="/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
